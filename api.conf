# AMS Vision Backend API - Production Nginx Configuration with SSL for Cloudflare
# This configuration sets up nginx as a reverse proxy for the FastAPI backend with Cloudflare Full (strict) SSL

upstream ams_backend {
    # FastAPI backend server
    server 127.0.0.1:8000;
    # For docker deployment, use:
    # server fastapi:8000;
    
    # Optional: Add multiple servers for load balancing
    # server 127.0.0.1:8001;
    # server 127.0.0.1:8002;
}

# Rate limiting zones - using CF-Connecting-IP for accurate rate limiting
limit_req_zone $http_cf_connecting_ip zone=api:10m rate=10r/s;
limit_req_zone $http_cf_connecting_ip zone=auth:10m rate=5r/s;
limit_req_zone $http_cf_connecting_ip zone=uploads:10m rate=2r/s;

# Redirect HTTP to HTTPS (handled by Cloudflare, but keeping for direct access)
server {
    listen 80;
    server_name api.ams-vision.local;  # Change to your domain
    return 301 https://$server_name$request_uri;
}

# HTTPS/SSL Configuration
server {
    listen 443 ssl;
    http2 on;
    server_name api.ams-vision.local;  # Change to your domain
    
    # SSL Configuration
    ssl_certificate     /etc/nginx/ssl/trackfacility.com.pem;
    ssl_certificate_key /etc/nginx/ssl/trackfacility.com.key;
    
    # SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # HSTS (HTTP Strict Transport Security) - Cloudflare handles this, but keeping for direct access
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    
    # Security headers - adjusted for Cloudflare
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    
    # Buffer settings
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 16 4k;
    proxy_busy_buffers_size 8k;
    
    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    
    # Health check endpoint (no rate limiting)
    location /health {
        proxy_pass http://ams_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Ray $http_cf_ray;
        proxy_set_header CF-Visitor $http_cf_visitor;
        
        # Health check specific settings
        access_log off;
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }
    
    # Root endpoint
    location = / {
        limit_req zone=api burst=20 nodelay;
        
        proxy_pass http://ams_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Ray $http_cf_ray;
        proxy_set_header CF-Visitor $http_cf_visitor;
    }
    
    # Authentication endpoints (stricter rate limiting)
    location /api/v1/auth/ {
        limit_req zone=auth burst=10 nodelay;
        
        proxy_pass http://ams_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Ray $http_cf_ray;
        proxy_set_header CF-Visitor $http_cf_visitor;
        
        # Additional security for auth endpoints
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
    }
    
    # File upload endpoints (limited rate)
    location /api/v1/files/ {
        limit_req zone=uploads burst=5 nodelay;
        
        # Allow large file uploads (4GB)
        client_max_body_size 4G;
        
        proxy_pass http://ams_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Ray $http_cf_ray;
        proxy_set_header CF-Visitor $http_cf_visitor;
        
        # File upload specific settings
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
    }
    
    # Static file serving for uploads
    location /uploads/ {
        alias /path/to/ams-vision-backend/uploads/;  # Update this path
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
        
        # Security: prevent execution of uploaded files
        location ~* \.(php|pl|py|js|cgi|sh|bat)$ {
            deny all;
        }
    }
    
    # API documentation (allow higher burst for docs)
    location ~ ^/api/v1/(docs|redoc|openapi\.json) {
        limit_req zone=api burst=50 nodelay;
        
        proxy_pass http://ams_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Ray $http_cf_ray;
        proxy_set_header CF-Visitor $http_cf_visitor;
        
        # Cache static documentation assets
        expires 1h;
        add_header Cache-Control "public";
    }
    
    # All other API endpoints
    location /api/v1/ {
        limit_req zone=api burst=20 nodelay;
        
        proxy_pass http://ams_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Ray $http_cf_ray;
        proxy_set_header CF-Visitor $http_cf_visitor;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        
        # CORS handling (Cloudflare can handle this, but keeping for fallback)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
    
    # Block access to sensitive files
    location ~ /\.(htaccess|htpasswd|env|git) {
        deny all;
    }
    
    # Block access to Python files
    location ~ \.py$ {
        deny all;
    }
    
    # Custom error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /404.html {
        return 404 '{"detail": "Not found"}';
        add_header Content-Type application/json;
    }
    
    location = /50x.html {
        return 500 '{"detail": "Internal server error"}';
        add_header Content-Type application/json;
    }
}
